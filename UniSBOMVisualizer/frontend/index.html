<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>SBOM Flow Matrix</title>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #0b0f17;
                color: #fff;
            }

            header {
                padding: 12px 20px;
                background: #111827;
                font-size: 18px;
                font-weight: bold;
                border-bottom: 1px solid #222;
            }

            #graph {
                width: 100%;
                height: calc(100vh - 50px);
            }

            @media (max-width: 768px) {
                header {
                    font-size: 14px;
                }
            }
        </style>
    </head>
    </head>

    <body>
        <header>PCFS SBOM Flow Matrix</header>
        <div id="graph"></div>
        <script type="module" src="/main.ts"></script>
        <script>
            // Responsive resize
            window.addEventListener("resize", () => {
                flow.init("#graph");
                flow.update(flow.data);
            });
        </script>
    </body>
</html>
