<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>EzSecOps-WorkOS</title>
        <!-- Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.bundle.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.js"></script>
        <!-- jQuery UI 1.11.4 -->
        <script src="/Users/aravindg/UNIFIED-SECOPS-HPE/WorkOS/UniSBOMVisualizer/frontend/js"></script>
        <!-- Resolve conflict in jQuery UI tooltip with Bootstrap tooltip -->

        <!-- Google Font: Source Sans Pro -->
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback"
        />
        <!-- AdminLTE -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.css"
        />
        <!-- Font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.css"
        />
        <style>
            #viz-container {
                height: 500px;
                background: #1e1e2f;
                border-radius: 6px;
            }
        </style>
    </head>
    <body class="hold-transition lockscreen">
        <!-- Automatic element centering -->
        <div class="lockscreen-wrapper">
            <div class="lockscreen-logo"><b>Work</b>OS</div>
            <!-- START LOCK SCREEN ITEM -->
            <div class="lockscreen-item">
                <!-- lockscreen image -->
                <div class="lockscreen-image">
                    <img src="./ezsecops-logo.png" alt="User Image" />
                </div>
                <!-- /.lockscreen-image -->

                <!-- lockscreen credentials (contains the form) -->
                <form class="lockscreen-credentials">
                    <div class="input-group">
                        <input
                            type="input"
                            class="form-control"
                            placeholder="Email"
                            id="emailInput"
                        />
                        <input
                            style="visibility: hidden"
                            type="input"
                            class="form-control"
                            placeholder="seslog"
                            id="seslog"
                        />
                        <div class="input-group-append" id="loginbtn">
                            <button type="button" class="btn">
                                <i class="fas fa-arrow-right text-muted"></i>
                            </button>
                        </div>
                    </div>
                </form>
                <!-- /.lockscreen credentials -->
            </div>
            <!-- /.lockscreen-item -->
            <div class="help-block text-center">
                Enter your email to login your session
            </div>
            <div class="lockscreen-footer text-center">
                Copyright &copy; 2026-2027
                <b
                    ><a href="mailto:ezsecops@hpe.com" class="text-black"
                        >EzSecOps</a
                    ></b
                ><br />
                All rights reserved
            </div>
        </div>
        <!-- /.center -->
        <script>
            // Select the button element from DOM
            const button = document.getElementById("loginbtn");
            const input = document.getElementById("emailInput");
            const feedback = document.getElementById("seslog");

            // Add onclick event listener
            button.onclick = function () {
                window.location.href = "http://localhost:5173/index.html";
            };

            input.addEventListener("keypress", function (event) {
                if (event.key === "Enter") {
                    event.preventDefault(); // Critical: stops form submit
                    event.stopPropagation(); // Stops bubbling
                    const email = input.value.trim();
                    const emailRegex = /^[^\s@]+@hpe\.com$/;
                    //const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // Basic email regex

                    if (emailRegex.test(email)) {
                        feedback.textContent = "Valid! Redirecting...";
                        window.location.href =
                            "http://localhost:5173/index.html";
                    } else {
                        alert("Invalid Email, 'Only @hpe.com allowed'");
                        feedback.textContent = "Invalid email format.";
                        input.focus();
                    }
                }
            });
        </script>
    </body>
</html>
