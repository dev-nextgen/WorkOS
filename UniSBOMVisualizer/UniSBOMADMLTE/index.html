<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SBOM Dashboard</title>

        <!-- AdminLTE -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.css"
        />

        <!-- Font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.css"
        />

        <style>
            #viz-container {
                height: 500px;
                background: #1e1e2f;
                border-radius: 6px;
            }
        </style>
    </head>

    <body class="hold-transition sidebar-mini layout-fixed">
        <div class="wrapper">
            <!-- NAVBAR -->
            <nav
                class="main-header navbar navbar-expand navbar-white navbar-light"
            >
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" data-widget="pushmenu" href="#"
                            ><i class="fas fa-bars"></i
                        ></a>
                    </li>
                    <li class="nav-item d-none d-sm-inline-block">
                        <a href="#" class="nav-link">Home</a>
                    </li>
                </ul>

                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#"
                            ><i class="fas fa-user"></i
                        ></a>
                    </li>
                </ul>
            </nav>

            <!-- SIDEBAR -->
            <aside class="main-sidebar sidebar-dark-primary elevation-4">
                <!-- Brand -->
                <a href="#" class="brand-link">
                    <span class="brand-text font-weight-light"
                        >SBOM Dashboard</span
                    >
                </a>

                <!-- Sidebar -->
                <div class="sidebar">
                    <!-- Menu -->
                    <nav class="mt-2">
                        <ul
                            class="nav nav-pills nav-sidebar flex-column"
                            data-widget="treeview"
                        >
                            <li class="nav-item">
                                <a href="#" class="nav-link active">
                                    <i
                                        class="nav-icon fas fa-project-diagram"
                                    ></i>
                                    <p>Flow Matrix</p>
                                </a>
                            </li>

                            <li class="nav-item">
                                <a href="#" class="nav-link">
                                    <i class="nav-icon fas fa-chart-pie"></i>
                                    <p>Sunburst</p>
                                </a>
                            </li>

                            <li class="nav-item">
                                <a href="#" class="nav-link">
                                    <i class="nav-icon fas fa-cogs"></i>
                                    <p>Settings</p>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </aside>

            <!-- CONTENT WRAPPER -->
            <div class="content-wrapper">
                <!-- HEADER -->
                <section class="content-header">
                    <div class="container-fluid">
                        <h1>SBOM Flow Matrix</h1>
                    </div>
                </section>

                <!-- MAIN CONTENT -->
                <section class="content">
                    <div class="container-fluid">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Visualization Panel</h3>
                            </div>

                            <div class="card-body">
                                <div id="viz-container">
                                    <!-- Your D3 will go here -->
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- FOOTER -->
            <footer class="main-footer text-center">
                <strong>© 2026 UniSBOM Platform</strong> | Built with EzSecOps
            </footer>
        </div>

        <!-- Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    </body>
</html>
